spring:
  application:
    name: spring-kotlin-template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:template}
    username: ${DB_USERNAME:template}
    password: ${DB_PASSWORD:change-me}
    hikari:
      pool-name: template-hikari-pool
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.template: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-at-least-32-byte-secret}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: false

logging:
  structured:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  structured:
    enabled: true
  level:
    root: INFO
    com.template: INFO
